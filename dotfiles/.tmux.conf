set -g prefix C-g
# Alt-g
set -g prefix2 M-g
# Disable prefix g 
unbind-key -T prefix g
bind-key g run-shell ""

# tmux-signal pid [signal] - send USR1 signal to running processes in pids session

# time in millis
set -g repeat-time 100

# Enable mouse clicks
set -g mouse on

# Tmux window pane separation
set -g status-style "bg=black,fg=colour2"
set -g window-status-format " #I:#W #[bg=black,fg=color2]|"
set -g window-status-current-format "#[fg=black,bg=colour2] #I:#W #[bg=black,fg=color2]|"
set -g window-status-last-style "fg=colour2,bg=colour240,bold"
set -g status-left ""
set -g status-right "#{?window_zoomed_flag,#[fg=black#,bg=colour3]     Zoom     ,}"
set -g window-status-separator ""

# Tmux pane style
set -g window-style bg=colour235
set -g window-active-style bg=colour234
set -g display-panes-time 4000

# Fixes the italics-in-manpages issue : http://superuser.com/questions/891336/fixed-highlighting-in-tmux
# But it breaks home/end
# set -g default-terminal xterm-color
# Enable ctrl-left/right skip word
# set-window-option -g xterm-keys on

# C-a C-a will pass C-a to app
bind C-a send-prefix

# Don't add a delay for esc
set -s escape-time 0

# Scrollback
set -g history-limit 10000

# Keys to reorder the windows left & right
bind-key -n C-S-Left swap-window -t -1
bind-key -n C-S-Right swap-window -t +1

# Move panes with Alt-arrows
bind -n M-Left  select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up    select-pane -U
bind -n M-Down  select-pane -D
# disable "select next layout"
unbind space

# window tabbing
bind-key S-Left previous-window -a
bind-key S-Right next-window -a
# Ctrl+Alt+{Left/Right} -> prev/next window index. -n = no prefix
bind -n C-M-Left previous-window
bind -n C-M-Right next-window
bind -n C-M-Up previous-window
bind -n C-M-Down next-window

# Start windows and panes at 1, not 0
set -g base-index 1
setw -g pane-base-index 1

# Don't auto-rename the window to the running command
set-option -g allow-rename off

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'

# Save&Restore tmux
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @resurrect-capture-pane-contents 'on'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @continuum-restore 'on'
set -g @resurrect-save 'C-1'
set -g @resurrect-restore 'C-2'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
# Press Ctrl-a+I to install the plugins
run '~/.tmux/plugins/tpm/tpm'

# Allow hyperlinks
set -ga set-clipboard on
set -ga allow-passthrough on
set -as terminal-features ',xterm*:hyperlinks,screen*:hyperlinks,tmux*:hyperlinks'

# Extended keys for Shift+Tab and other special sequences
set -s extended-keys on
set -as terminal-features ',xterm*:extkeys'


# NTM Dashboard Overlay (added by 'ntm bind --overlay')
bind-key -n F12 display-popup -E -w 95% -h 95% "NTM_POPUP=1 ntm dashboard --popup #{session_name}"
bind -T root C-t run-shell -b "tmux-signal #{pane_pid} #{pane_id}"
